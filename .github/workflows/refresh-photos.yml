name: Получить реальные фотографии

on:
  push:
    branches: [main]
    paths:
      - build_photos.py
      - .github/workflows/refresh-photos.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-photos
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить обработку изображений
        run: python -m pip install --upgrade pillow requests

      - name: Скачать, отобрать и оптимизировать фотографии
        run: python build_photos.py

      - name: Сохранить фотографии в репозитории
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photos
          if git diff --cached --quiet; then
            echo "Изменений нет"
          else
            git commit -m "Обновить реальные фотографии 4Е"
            git push
          fi
